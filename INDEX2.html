<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IntraAi — Product Demo</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800;900&family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:#06060f;overflow:hidden;height:100vh;width:100vw;color:#fff}

/* SHELL */
.shell{position:fixed;inset:0;display:flex;flex-direction:column;
  background:radial-gradient(ellipse 80% 50% at 50% 0%,rgba(99,102,241,.16) 0%,transparent 65%),
             radial-gradient(ellipse 50% 40% at 85% 100%,rgba(139,92,246,.1) 0%,transparent 55%),#06060f}

/* TOP BAR */
.topbar{flex-shrink:0;height:50px;display:flex;align-items:center;justify-content:space-between;
  padding:0 28px;border-bottom:1px solid rgba(99,102,241,.18);background:rgba(6,6,15,.85);backdrop-filter:blur(16px)}
.tb-brand{font-family:'Sora',sans-serif;font-size:17px;font-weight:900;
  background:linear-gradient(135deg,#a5b4fc,#6366f1);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.tb-right{display:flex;align-items:center;gap:14px}
.sc-badge{font-family:'Sora',sans-serif;font-size:10px;font-weight:700;letter-spacing:1.5px;
  text-transform:uppercase;color:#818cf8;background:rgba(99,102,241,.13);
  border:1px solid rgba(99,102,241,.28);padding:3px 11px;border-radius:99px}
.nav-row{display:flex;gap:6px}
.nb{width:30px;height:30px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);
  border-radius:7px;color:#94a3b8;font-size:13px;cursor:pointer;display:flex;align-items:center;
  justify-content:center;transition:all .2s;font-family:monospace}
.nb:hover{background:rgba(99,102,241,.18);border-color:rgba(99,102,241,.38);color:#fff}
.ap-ring{width:28px;height:28px;position:relative;cursor:pointer;flex-shrink:0}
.ap-ring svg{position:absolute;inset:0;transform:rotate(-90deg)}
.ap-icon{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:9px;color:#818cf8}
.ap-paused .pi-play{display:none}.ap-paused .pi-pause{display:flex;position:absolute;inset:0;align-items:center;justify-content:center;font-size:9px;color:#818cf8}
.pi-pause{display:none}

/* MAIN */
.main{flex:1;display:flex;gap:18px;padding:16px 22px 12px;min-height:0}

/* SIDEBAR */
.sidebar{flex-shrink:0;width:128px;display:flex;flex-direction:column;gap:5px;overflow-y:auto;scrollbar-width:none}
.sidebar::-webkit-scrollbar{display:none}
.th{border-radius:8px;overflow:hidden;cursor:pointer;border:1.5px solid rgba(255,255,255,.06);transition:all .22s;flex-shrink:0}
.th:hover{border-color:rgba(99,102,241,.45);transform:translateX(2px)}
.th.on{border-color:#6366f1;box-shadow:0 0 0 2px rgba(99,102,241,.28)}
.th-img{height:72px;overflow:hidden;position:relative}
.th-label{font-family:'Sora',sans-serif;font-size:9px;font-weight:600;color:#64748b;
  padding:4px 6px;background:rgba(0,0,0,.45);text-align:center;letter-spacing:.4px}
.th.on .th-label{color:#a5b4fc}

/* BROWSER */
.bwrap{flex:1;display:flex;flex-direction:column;min-width:0}
.bchrome{flex-shrink:0;height:36px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);
  border-bottom:none;border-radius:11px 11px 0 0;display:flex;align-items:center;padding:0 12px;gap:8px}
.dots{display:flex;gap:4px}
.dt{width:10px;height:10px;border-radius:50%}
.dr{background:#ef4444}.dy{background:#f59e0b}.dg{background:#22c55e}
.urlbar{flex:1;height:20px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.09);
  border-radius:5px;display:flex;align-items:center;padding:0 9px;font-size:10px;color:#64748b;gap:5px;font-family:'DM Sans',sans-serif}
.bvp{flex:1;border:1px solid rgba(255,255,255,.08);border-top:none;border-radius:0 0 11px 11px;
  overflow:hidden;position:relative;background:#f8faff}
.sc{position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;transition:opacity .38s ease,transform .38s cubic-bezier(.34,1.56,.64,1);scrollbar-width:thin;scrollbar-color:rgba(99,102,241,.25) transparent}
.sc.ei{opacity:0;transform:translateY(14px)}.sc.vi{opacity:1;transform:translateY(0)}.sc.le{opacity:0;transform:translateY(-10px)}

/* PROGRESS */
.prog-wrap{flex-shrink:0;padding:0 22px 14px}
.prog-labels{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.prog-info{font-family:'Sora',sans-serif;font-size:10px;font-weight:600;color:#475569;letter-spacing:.5px}
.prog-track{height:3px;background:rgba(255,255,255,.07);border-radius:99px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,#6366f1,#818cf8);border-radius:99px;transition:width .55s cubic-bezier(.34,1.56,.64,1)}
</style>
</head>

<div class="shell">

    <div class="tb-brand">IntraAi · Product Demo</div>
    <div class="tb-right">

        <div class="nb" onclick="prev()">‹</div>
        <div class="nb" onclick="next()">›</div>
      </div>

        <svg width="28" height="28"><circle cx="14" cy="14" r="11" fill="none" stroke="rgba(99,102,241,.2)" stroke-width="2"/><circle cx="14" cy="14" r="11" fill="none" stroke="#6366f1" stroke-width="2" stroke-dasharray="69.1" id="tring" stroke-dashoffset="69.1" stroke-linecap="round"/></svg>

      </div>
      <div class="bvp"><div id="host"></div></div>
    </div>
  </div>

  <div class="prog-wrap">
    <div class="prog-labels">
      <span class="prog-info" id="pinfo">1 / 9  ·  Landing Page</span>
      <span class="prog-info" id="aplabel" style="color:#6366f1">▶ AUTO-PLAY</span>
    </div>
    <div class="prog-track"><div class="prog-fill" id="pfill" style="width:11.1%"></div></div>
  </div>
</div>

  </div>
</div>
</div>`},

{id:"liveinterview",label:"Live Interview",url:"intraai.vercel.app/dashboard/interview/abc/start",bg:"#f8faff",
html:`<div style="background:#f8faff;min-height:860px;font-family:'DM Sans',sans-serif">
<div style="height:54px;display:flex;align-items:center;padding:0 28px;background:#fff;border-bottom:1px solid #e0e7ff;justify-content:space-between">
  <span style="font-family:'Sora',sans-serif;font-size:15px;font-weight:800;color:#05264e">IntraAi</span>
  <span style="font-family:'Sora',sans-serif;font-size:11px;font-weight:700;color:#6366f1">Full Stack Developer · 3 Years</span>
</div>
<div style="max-width:880px;margin:0 auto;padding:22px;display:grid;grid-template-columns:1fr 1fr;gap:18px">
  <div>
    <div style="display:flex;gap:6px;margin-bottom:14px">
      ${[1,2,3,4,5].map(n=>`<div style="width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-family:'Sora',sans-serif;font-size:11px;font-weight:700;cursor:pointer;${n===2?'background:linear-gradient(135deg,#6366f1,#4f46e5);color:#fff;box-shadow:0 4px 12px rgba(99,102,241,.35)':'background:#fff;border:1.5px solid #e0e7ff;color:#64748b'}">Q${n}</div>`).join("")}
    </div>
    <div style="background:#fff;border:1.5px solid #e0e7ff;border-radius:14px;padding:20px;margin-bottom:14px">
      <div style="display:flex;gap:10px;align-items:flex-start;margin-bottom:12px">
        <div style="width:30px;height:30px;background:linear-gradient(135deg,#6366f1,#4f46e5);border-radius:9px;display:flex;align-items:center;justify-content:center;font-family:'Sora',sans-serif;font-size:13px;font-weight:800;color:#fff;flex-shrink:0">2</div>
        <p style="font-family:'DM Sans',sans-serif;font-size:12px;color:#1e293b;line-height:1.7;margin:0">In React, how do you handle performance optimization when rendering a list of 500+ items that updates frequently? Walk me through your approach.</p>
      </div>
      <div style="display:flex;align-items:center;gap:7px;background:#f0f9ff;border:1px solid #bae6fd;border-radius:7px;padding:7px 11px;cursor:pointer">
        <span style="font-size:13px">🔊</span>
        <span style="font-family:'Sora',sans-serif;font-size:10px;font-weight:700;color:#0284c7">Read Question Aloud</span>
      </div>
    </div>
    <div style="background:#fffbeb;border:1.5px solid #fde68a;border-radius:11px;padding:13px">
      <div style="display:flex;gap:7px">
        <span style="font-size:14px">💡</span>
        <p style="font-family:'DM Sans',sans-serif;font-size:11px;color:#374151;line-height:1.6">Mention <strong>React.memo</strong>, <strong>useMemo</strong>, <strong>useCallback</strong>, and <strong>windowing</strong> with react-window or react-virtual.</p>
      </div>
    </div>
  </div>
  <div>
    <div style="background:#1e1b4b;border-radius:14px;overflow:hidden;margin-bottom:12px;position:relative">
      <div style="aspect-ratio:4/3;display:flex;align-items:center;justify-content:center">
        <div style="width:90px;height:90px;border-radius:50%;border:3px solid rgba(99,102,241,.4);display:flex;align-items:center;justify-content:center;font-size:36px">👤</div>
      </div>
      <div style="position:absolute;top:10px;right:10px;background:rgba(239,68,68,.9);color:#fff;font-family:'Sora',sans-serif;font-size:9px;font-weight:700;padding:3px 9px;border-radius:99px;display:flex;align-items:center;gap:4px">
        <span style="width:5px;height:5px;background:#fff;border-radius:50%;animation:blink 1s infinite;display:inline-block"></span>REC
      </div>
    </div>
    <div style="background:#f8faff;border:1.5px solid #e0e7ff;border-radius:11px;padding:13px;margin-bottom:12px">
      <div style="font-family:'Sora',sans-serif;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:#6366f1;margin-bottom:7px">🎙 Your Answer</div>
      <p style="font-family:'DM Sans',sans-serif;font-size:11px;color:#374151;line-height:1.7">For rendering large lists in React I would use windowing with react-window. This renders only visible items instead of all 500+. I'd also use React.memo on list item components and useCallback for handlers...</p>
    </div>
    <div style="background:linear-gradient(135deg,#ef4444,#dc2626);border-radius:11px;padding:11px;text-align:center;cursor:pointer;box-shadow:0 4px 14px rgba(239,68,68,.38)">
      <span style="font-family:'Sora',sans-serif;font-size:12px;font-weight:700;color:#fff">⏹  Stop Recording → Auto-saves &amp; Evaluates</span>
    </div>
  </div>
</div>
</div>`},

{id:"feedback",label:"Feedback Report",url:"intraai.vercel.app/dashboard/interview/abc/feedback",bg:"#f8faff",
html:`<div style="background:#f8faff;min-height:860px;font-family:'DM Sans',sans-serif">
<div style="max-width:840px;margin:0 auto;padding:24px 22px">

    <div style="position:absolute;top:-50px;right:-50px;width:220px;height:220px;background:radial-gradient(circle,rgba(34,197,94,.14),transparent 65%);border-radius:50%"></div>

    <h2 style="font-family:'Sora',sans-serif;font-size:26px;font-weight:900;color:#fff;margin-bottom:6px;letter-spacing:-1px">Interview Complete!</h2>

    <div style="display:inline-flex;align-items:center;gap:7px;background:#f0fdf4;color:#22c55e;border:2px solid #bbf7d0;font-family:'Sora',sans-serif;font-size:12px;font-weight:800;padding:6px 18px;border-radius:99px">Excellent 🏆</div>
    <div style="margin-top:18px;background:rgba(255,255,255,.1);border-radius:12px;padding:12px 26px;display:inline-block">

    </div>
  </div>
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:18px">
    ${[{sym:"🎯",l:"Overall Score",v:"8.2/10",c:"#6366f1",p:82},{sym:"📋",l:"Questions Done",v:"5",c:"#f59e0b",p:100},{sym:"✅",l:"Selection Chance",v:"92%",c:"#22c55e",p:92}].map(({sym,l,v,c,p})=>`<div style="background:#fff;border:1.5px solid #e0e7ff;border-radius:14px;padding:16px;text-align:center"><div style="position:relative;width:74px;height:74px;margin:0 auto 10px"><svg width="74" height="74"><circle cx="37" cy="37" r="31" fill="none" stroke="#e0e7ff" stroke-width="6"/><circle cx="37" cy="37" r="31" fill="none" stroke="${c}" stroke-width="6" stroke-dasharray="${2*Math.PI*31*p/100} ${2*Math.PI*31}" stroke-linecap="round" transform="rotate(-90 37 37)"/></svg><div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:20px">${sym}</div></div><div style="font-family:'Sora',sans-serif;font-size:17px;font-weight:800;color:#05264e">${v}</div><div style="font-family:'Sora',sans-serif;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#94a3b8;margin-top:2px">${l}</div></div>`).join("")}
  </div>
  <h3 style="font-family:'Sora',sans-serif;font-size:15px;font-weight:700;color:#05264e;margin-bottom:10px">Latest Responses</h3>
  ${[{n:1,q:"How do you handle performance optimization for large React lists?",s:9,c:"#22c55e"},{n:2,q:"Describe a challenging production bug you debugged and fixed.",s:8,c:"#22c55e"},{n:3,q:"How would you design a scalable REST API from scratch?",s:7,c:"#22c55e"},{n:4,q:"Tell me about a time you disagreed with a technical decision.",s:8,c:"#22c55e"},{n:5,q:"Where do you see yourself in 3 years?",s:9,c:"#22c55e"}].map(({n,q,s,c})=>`<div style="background:#fff;border:1.5px solid #e0e7ff;border-radius:11px;margin-bottom:7px"><div style="display:flex;justify-content:space-between;align-items:center;padding:12px 15px"><div style="display:flex;align-items:center;gap:9px"><div style="width:30px;height:30px;background:linear-gradient(135deg,${c},${c}cc);border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0"><span style="font-family:'Sora',sans-serif;font-size:10px;font-weight:900;color:#fff;line-height:1">${s}</span><span style="font-family:'Sora',sans-serif;font-size:7px;color:rgba(255,255,255,.65);line-height:1">/10</span></div><span style="font-family:'DM Sans',sans-serif;font-size:11px;color:#1e293b;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:360px">${q}</span></div><span style="font-family:'Sora',sans-serif;font-size:10px;font-weight:700;color:${c};background:${c}18;padding:2px 7px;border-radius:99px;flex-shrink:0">${s}/10</span></div></div>`).join("")}
</div>
</div>`},

{id:"cb",label:"Confidence Booster",url:"intraai.vercel.app/dashboard/confidence",bg:"#f8faff",
html:`<div style="background:#f8faff;min-height:860px;font-family:'DM Sans',sans-serif;padding:28px 22px">
<div style="max-width:880px;margin:0 auto">
  <div style="text-align:center;margin-bottom:32px">
    <div style="font-family:'Sora',sans-serif;font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:#6366f1;margin-bottom:9px">✦ MENTAL PREP</div>
    <h1 style="font-family:'Sora',sans-serif;font-size:34px;font-weight:900;color:#05264e;margin-bottom:7px;letter-spacing:-1px">Confidence <span style="background:linear-gradient(135deg,#6366f1,#818cf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent">Booster</span></h1>
    <p style="font-family:'DM Sans',sans-serif;font-size:13px;color:#64748b">Prepare your mind before the interview — calm, focused, and ready.</p>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
    <div style="background:#fff;border:1.5px solid #e0e7ff;border-radius:18px;padding:24px">
      <div style="font-size:22px;margin-bottom:7px">💬</div>
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
        <div style="font-family:'Sora',sans-serif;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:#6366f1">TODAY'S QUOTE</div>
        <div style="background:#eef2ff;border:1px solid #c7d2fe;border-radius:99px;padding:2px 9px;font-family:'Sora',sans-serif;font-size:9px;font-weight:700;color:#6366f1">✨ AI Generated</div>
      </div>
      <blockquote style="font-family:'DM Sans',sans-serif;font-size:14px;font-style:italic;color:#1e293b;line-height:1.65;border-left:3px solid #6366f1;padding-left:13px;margin-bottom:8px">"Preparation is not about predicting every question — it's about building the confidence to handle any question."</blockquote>
      <p style="font-family:'Sora',sans-serif;font-size:10px;font-weight:600;color:#94a3b8">— Gemini AI</p>
      <div style="display:inline-flex;align-items:center;gap:5px;margin-top:12px;border:1.5px solid #6366f1;border-radius:8px;padding:7px 15px;cursor:pointer;font-family:'Sora',sans-serif;font-size:11px;font-weight:700;color:#6366f1">✨ New Quote →</div>
    </div>
    <div style="background:#fff;border:1.5px solid #e0e7ff;border-radius:18px;padding:24px">
      <div style="font-size:22px;margin-bottom:7px">🫁</div>
      <div style="font-family:'Sora',sans-serif;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:#6366f1;margin-bottom:7px">4-7-8 BREATHING</div>
      <p style="font-family:'DM Sans',sans-serif;font-size:11px;color:#64748b;margin-bottom:16px">Clinically proven to calm nerves in under 20 seconds.</p>
      <div style="display:flex;flex-direction:column;align-items:center;gap:10px">
        <div style="width:100px;height:100px;border-radius:50%;border:5px solid #22c55e;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:3px">
          <span style="font-size:20px">💨</span>
          <span style="font-family:'Sora',sans-serif;font-size:18px;font-weight:800;color:#22c55e">4s</span>
        </div>
        <p style="font-family:'Sora',sans-serif;font-size:14px;font-weight:700;color:#22c55e">Exhale slowly</p>
        <p style="font-family:'DM Sans',sans-serif;font-size:11px;color:#94a3b8">through your mouth</p>
        <div style="width:100%;height:5px;background:#f1f5f9;border-radius:99px;overflow:hidden"><div style="width:45%;height:100%;background:#22c55e;border-radius:99px"></div></div>
      </div>
    </div>
    <div style="background:#fff;border:1.5px solid #e0e7ff;border-radius:18px;padding:24px">
      <div style="font-size:22px;margin-bottom:7px">🧘</div>
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
        <div style="font-family:'Sora',sans-serif;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:#6366f1">MINDFULNESS</div>
        <div style="background:#eef2ff;border:1px solid #c7d2fe;border-radius:99px;padding:2px 9px;font-family:'Sora',sans-serif;font-size:9px;font-weight:700;color:#6366f1">✨ AI Generated</div>
      </div>
      <p style="font-family:'DM Sans',sans-serif;font-size:13px;color:#374151;line-height:1.7;background:linear-gradient(135deg,#f8faff,#eef2ff);border:1.5px solid #e0e7ff;border-radius:10px;padding:13px;font-style:italic">Close your eyes and take three slow breaths. With each exhale, release one worry about the interview. You walk in calm, prepared, and ready.</p>
      <div style="display:inline-flex;align-items:center;gap:5px;margin-top:12px;border:1.5px solid #6366f1;border-radius:8px;padding:7px 15px;cursor:pointer;font-family:'Sora',sans-serif;font-size:11px;font-weight:700;color:#6366f1">✨ New Prompt →</div>
    </div>
    <div style="background:#fff;border:1.5px solid #e0e7ff;border-radius:18px;padding:24px">
      <div style="font-size:22px;margin-bottom:7px">🚀</div>
      <div style="font-family:'Sora',sans-serif;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:#6366f1;margin-bottom:11px">QUICK TIPS</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:7px">
        ${[["🎯","Research the company before your interview"],["⭐","Use STAR: Situation, Task, Action, Result"],["📊","Quantify with specific numbers"],["🤝","Prepare 3-5 questions to ask them"],["🧘","Arrive 10 minutes early"],["💬","Silence before answering is okay"]].map(([i,t])=>`<div style="background:#f8faff;border:1.5px solid #e8edf8;border-radius:9px;padding:9px;display:flex;gap:7px;align-items:flex-start"><span style="font-size:12px;flex-shrink:0">${i}</span><p style="font-family:'DM Sans',sans-serif;font-size:10px;color:#374151;line-height:1.5">${t}</p></div>`).join("")}
      </div>
    </div>
  </div>
</div>
</div>`},

{id:"how",label:"How It Works",url:"intraai.vercel.app/dashboard/how",bg:"#f8faff",
html:`<div style="background:#f8faff;min-height:860px;font-family:'DM Sans',sans-serif;padding:28px 22px">
<div style="max-width:840px;margin:0 auto">
  <div style="background:linear-gradient(135deg,#1e1b4b,#312e81);border-radius:20px;padding:36px;margin-bottom:28px;position:relative;overflow:hidden">
    <div style="position:absolute;top:-50px;right:-50px;width:220px;height:220px;background:radial-gradient(circle,rgba(129,140,248,.12),transparent 65%);border-radius:50%"></div>
    <div style="font-family:'Sora',sans-serif;font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:#818cf8;margin-bottom:11px">✦ PLATFORM GUIDE</div>
    <h1 style="font-family:'Sora',sans-serif;font-size:30px;font-weight:900;color:#fff;letter-spacing:-1px;margin-bottom:13px">How <span style="background:linear-gradient(135deg,#a5b4fc,#818cf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent">IntraAi</span> Works</h1>
    <p style="font-family:'DM Sans',sans-serif;font-size:13px;color:rgba(255,255,255,.55);max-width:580px;line-height:1.75;margin-bottom:18px">Uses voice recognition, webcam monitoring, and Gemini AI evaluation to simulate a real interview environment from any browser.</p>
    <div style="display:flex;flex-wrap:wrap;gap:7px">${["Voice-Based","AI-Scored","Webcam Enabled","Instant Feedback","Unlimited Practice"].map(t=>`<span style="font-family:'Sora',sans-serif;font-size:10px;font-weight:600;background:rgba(255,255,255,.1);color:#a5b4fc;border:1px solid rgba(165,180,252,.3);padding:3px 11px;border-radius:99px">${t}</span>`).join("")}</div>
  </div>
  <h2 style="font-family:'Sora',sans-serif;font-size:18px;font-weight:800;color:#05264e;margin-bottom:16px">Step-by-Step Process</h2>
  ${[{n:"01",i:"🔐",t:"Login Securely",d:"Sign in with Google or email via Clerk — fast and passwordless."},{n:"02",i:"🎯",t:"Set Your Interview",d:"Enter job role, tech stack and experience. AI tailors every question to your profile."},{n:"03",i:"🎙️",t:"Speak Your Answers",d:"Click Record and answer verbally — just like sitting in front of a real interviewer."},{n:"04",i:"🤖",t:"Real-Time AI Analysis",d:"Gemini AI evaluates your speech and content quality within seconds of finishing."},{n:"05",i:"📊",t:"Get Instant Feedback",d:"Score, model answer, strengths, improvement areas and study links — instantly."},{n:"06",i:"📈",t:"Track & Improve",d:"All sessions saved. Review feedback, compare scores, repeat until confident."}].map(({n,i,t,d},idx)=>`<div style="display:flex;gap:14px;margin-bottom:12px;align-items:flex-start"><div style="display:flex;flex-direction:column;align-items:center;flex-shrink:0;width:40px"><div style="width:40px;height:40px;background:linear-gradient(135deg,#6366f1,#4f46e5);border-radius:11px;display:flex;align-items:center;justify-content:center;font-family:'Sora',sans-serif;font-size:11px;font-weight:800;color:#fff;box-shadow:0 4px 12px rgba(99,102,241,.3)">${n}</div>${idx<5?'<div style="width:2px;height:24px;background:linear-gradient(#6366f1,#c7d2fe);border-radius:99px;margin-top:3px"></div>':''}</div><div style="background:#fff;border:1.5px solid #e0e7ff;border-radius:12px;padding:14px 16px;flex:1"><div style="display:flex;align-items:center;gap:7px;margin-bottom:3px"><span style="font-size:14px">${i}</span><span style="font-family:'Sora',sans-serif;font-size:12px;font-weight:700;color:#05264e">${t}</span></div><p style="font-family:'DM Sans',sans-serif;font-size:11px;color:#64748b;line-height:1.6;margin:0">${d}</p></div></div>`).join("")}
</div>
</div>`},

{id:"community",label:"Community",url:"intraai.vercel.app/dashboard/feedback-form",bg:"#f8faff",
html:`<div style="background:#f8faff;min-height:860px;font-family:'DM Sans',sans-serif;padding:28px 22px">
<div style="max-width:880px;margin:0 auto">
  <div style="text-align:center;margin-bottom:28px">
    <div style="font-family:'Sora',sans-serif;font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:#6366f1;margin-bottom:9px">✦ COMMUNITY</div>

  <div style="background:linear-gradient(135deg,#f8faff,#eef2ff);border:1.5px solid #e0e7ff;border-radius:16px;padding:22px;margin-bottom:30px;overflow:hidden">
    <div style="display:flex;gap:14px">
      ${[{n:"Riya Sharma",t:"React Developer",c:"#6366f1",tx:"IntraAi gave me incredibly specific feedback. The study links were exactly what I needed to fill my gaps before my Google interview!"},{n:"Arjun Patil",t:"Full Stack Dev",c:"#a855f7",tx:"The voice recording makes it feel like a real interview. My confidence score went from 3/10 to 8/10 in just two weeks of practice."},{n:"Priya Nair",t:"Node.js Backend",c:"#f59e0b",tx:"I loved the radar chart breakdown. Seeing my Confidence score low made me specifically focus on that area."}].map(({n,t,c,tx})=>`<div style="flex:0 0 255px;background:#fff;border:1.5px solid #e0e7ff;border-radius:14px;padding:18px"><div style="display:flex;align-items:center;gap:9px;margin-bottom:9px"><div style="width:35px;height:35px;background:${c};border-radius:9px;display:flex;align-items:center;justify-content:center;font-family:'Sora',sans-serif;font-size:12px;font-weight:800;color:#fff;flex-shrink:0">${n[0]}</div><div><div style="font-family:'Sora',sans-serif;font-size:11px;font-weight:700;color:#05264e">${n}</div><div style="font-family:'DM Sans',sans-serif;font-size:10px;color:#6366f1">${t}</div></div></div><div style="color:#fbbf24;font-size:10px;letter-spacing:2px;margin-bottom:7px">★★★★★</div><p style="font-family:'DM Sans',sans-serif;font-size:11px;color:#374151;font-style:italic;line-height:1.65;background:#f8faff;border-left:3px solid #6366f1;padding:7px 9px;border-radius:0 7px 7px 0">"${tx}"</p></div>`).join("")}
    </div>
  </div>
  <div style="max-width:560px;margin:0 auto">
    <div style="text-align:center;margin-bottom:20px">
      <h2 style="font-family:'Sora',sans-serif;font-size:20px;font-weight:800;color:#05264e;margin-bottom:5px">Tell Us What <span style="background:linear-gradient(135deg,#6366f1,#818cf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent">You Think</span></h2>
      <p style="font-family:'DM Sans',sans-serif;font-size:12px;color:#64748b">Your feedback helps us make IntraAi better for everyone.</p>
    </div>
    <div style="background:#fff;border:1.5px solid #e0e7ff;border-radius:18px;padding:28px">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px">${[["Your Name","Prathamesh Dandage"],["Interview Topic","Full Stack Development"]].map(([l,ph])=>`<div><div style="font-family:'Sora',sans-serif;font-size:10px;font-weight:600;color:#374151;margin-bottom:4px">${l} *</div><div style="border:1.5px solid #e0e7ff;border-radius:8px;padding:9px 11px;font-family:'DM Sans',sans-serif;font-size:11px;color:#94a3b8">${ph}</div></div>`).join("")}</div>
      <div style="margin-bottom:12px"><div style="font-family:'Sora',sans-serif;font-size:10px;font-weight:600;color:#374151;margin-bottom:4px">Email *</div><div style="border:1.5px solid #e0e7ff;border-radius:8px;padding:9px 11px;font-family:'DM Sans',sans-serif;font-size:11px;color:#94a3b8">you@example.com</div></div>
      <div style="margin-bottom:18px"><div style="font-family:'Sora',sans-serif;font-size:10px;font-weight:600;color:#374151;margin-bottom:4px">Your Feedback *</div><div style="border:1.5px solid #6366f1;border-radius:8px;padding:10px;font-family:'DM Sans',sans-serif;font-size:11px;color:#374151;min-height:70px;line-height:1.6;box-shadow:0 0 0 3px rgba(99,102,241,.1)">IntraAi completely transformed my interview prep. The AI feedback was spot-on and the study links were exactly what I needed...</div></div>
      <div style="background:linear-gradient(135deg,#6366f1,#4f46e5);border-radius:11px;padding:11px;text-align:center;cursor:pointer;box-shadow:0 4px 16px rgba(99,102,241,.35)"><span style="font-family:'Sora',sans-serif;font-size:12px;font-weight:700;color:#fff">Submit Feedback →</span></div>
    </div>
  </div>
</div>
</div>`},
];

// ─── ENGINE ───────────────────────────────────────────────────────────────────
let cur=0, playing=true, tid=null, prog=0;
const DUR=5200, CIRC=69.1, STEP=50;

function init(){buildSB();show(0,false);startAP()}

function buildSB(){
  const sb=document.getElementById('sb');
  screens.forEach((s,i)=>{
    const w=document.createElement('div');
    w.className='th'+(i===0?' on':'');w.id='th'+i;
    w.onclick=()=>goTo(i);
    w.innerHTML=`<div class="th-img" style="background:${s.bg}">
      <div style="transform:scale(0.14);transform-origin:top left;width:714%;position:absolute;top:0;left:0;pointer-events:none;overflow:hidden;max-height:${72/0.14}px">${s.html.slice(0,1200)}</div>
      <div style="position:absolute;inset:0;background:linear-gradient(to bottom,transparent 30%,${s.bg==='#f8faff'?'rgba(248,250,255,.9)':'rgba(6,6,15,.9)'} 100%)"></div>
    </div><div class="th-label">${s.label}</div>`;
    sb.appendChild(w);
  });
}

function show(i,anim=true){
  const host=document.getElementById('host');
  if(anim&&host.children.length){
    const old=host.children[0];
    old.className='sc le';
    setTimeout(()=>old.remove(),380);
  }else host.innerHTML='';
  const d=document.createElement('div');
  d.className='sc'+(anim?' ei':' vi');
  d.innerHTML=screens[i].html;
  host.appendChild(d);
  if(anim)requestAnimationFrame(()=>requestAnimationFrame(()=>{d.className='sc vi'}));
  document.getElementById('url').textContent=screens[i].url;
  document.getElementById('scBadge').textContent=screens[i].label;
  document.getElementById('pinfo').textContent=`${i+1} / ${screens.length}  ·  ${screens[i].label}`;
  document.getElementById('pfill').style.width=`${((i+1)/screens.length)*100}%`;
  document.querySelectorAll('.th').forEach((t,j)=>{t.className='th'+(j===i?' on':'')});
  document.getElementById('th'+i)?.scrollIntoView({behavior:'smooth',block:'nearest'});
  cur=i;
}

function next(){resetT();show((cur+1)%screens.length,true);if(playing)startT()}
function prev(){resetT();show((cur-1+screens.length)%screens.length,true);if(playing)startT()}
function goTo(i){resetT();show(i,true);if(playing)startT()}

function startAP(){
  playing=true;
  document.getElementById('apBtn').classList.remove('ap-paused');
  document.getElementById('aplabel').textContent='▶ AUTO-PLAY';
  document.getElementById('aplabel').style.color='#6366f1';
  startT();
}
function stopAP(){
  playing=false;
  document.getElementById('apBtn').classList.add('ap-paused');
  document.getElementById('aplabel').textContent='⏸ PAUSED';
  document.getElementById('aplabel').style.color='#64748b';
  clearInterval(tid);resetR();
}
function toggleAP(){playing?stopAP():startAP()}

function startT(){
  clearInterval(tid);prog=0;
  const ring=document.getElementById('tring');
  let ticks=0,steps=DUR/STEP;
  tid=setInterval(()=>{
    ticks++;
    ring.style.strokeDashoffset=CIRC-CIRC*(ticks/steps);
    if(ticks>=steps){clearInterval(tid);next();if(playing)startT()}
  },STEP);
}
function resetT(){clearInterval(tid);resetR()}
function resetR(){const r=document.getElementById('tring');if(r)r.style.strokeDashoffset=CIRC}

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key===' '){e.preventDefault();next()}
  if(e.key==='ArrowLeft'){e.preventDefault();prev()}
  if(e.key==='p'||e.key==='P')toggleAP();
});

init();
</script>
</body>
</html>
